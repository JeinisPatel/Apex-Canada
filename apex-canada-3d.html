<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Apex Canada 3D</title>
  <style>
    :root{--bg:#05070d;--ink:#e9edf4;--dim:#8b93a3;--accent:#39d2c0;--warn:#f0c860;--red:#e23a36}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:"Avenir Next","Segoe UI",system-ui,sans-serif}
    #apex3d{position:absolute;inset:0;width:100%;height:100%;display:block}
    .hud{position:absolute;z-index:4;pointer-events:none;text-shadow:0 2px 18px rgba(0,0,0,.9)}
    #brand{top:16px;left:16px;background:linear-gradient(180deg,rgba(9,12,18,.82),rgba(9,12,18,.54));border:1px solid rgba(255,255,255,.12);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;backdrop-filter:blur(8px)}
    #brand h1{font-size:18px;font-weight:900;font-style:italic;letter-spacing:.12em;text-transform:uppercase}
    #brand p{font-size:12px;color:var(--dim);margin-top:3px;letter-spacing:.08em;text-transform:uppercase}
    #menubtn{position:absolute;z-index:8;top:16px;right:16px;pointer-events:auto;font:800 12px/1 "Avenir Next","Segoe UI",system-ui;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);background:linear-gradient(180deg,rgba(9,12,18,.82),rgba(9,12,18,.54));border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:11px 15px;cursor:pointer;backdrop-filter:blur(8px);transition:all .12s}
    #menubtn:hover{color:var(--ink);border-color:var(--accent)}
    #modes{top:88px;left:16px;display:flex;gap:5px;pointer-events:auto}
    #tracks{top:124px;left:16px;display:flex;flex-wrap:wrap;gap:5px;max-width:340px;pointer-events:auto}
    #modes button,#tracks button{font:700 11px/1 "Avenir Next","Segoe UI",system-ui;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);background:rgba(9,12,18,.72);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:6px 9px;cursor:pointer;backdrop-filter:blur(8px);transition:all .12s}
    #modes button:hover,#tracks button:hover{color:var(--ink);border-color:var(--accent)}
    #modes button.on,#tracks button.on{color:#05070d;background:var(--accent);border-color:var(--accent)}
    #modes button[data-m="quali"].on{background:var(--warn);border-color:var(--warn)}
    #modes button.diff{border-color:rgba(240,200,96,.5);color:var(--warn);background:rgba(16,14,8,.6);margin-left:6px}
    #modes button.diff:hover{background:var(--warn);color:#05070d}
    #dash{right:16px;bottom:18px;text-align:right;background:linear-gradient(180deg,rgba(9,12,18,.82),rgba(9,12,18,.54));border:1px solid rgba(255,255,255,.12);border-left:3px solid #3a7fe8;border-radius:8px;padding:12px 16px;min-width:200px;backdrop-filter:blur(8px)}
    #speed{font-size:54px;font-weight:900;font-style:italic;line-height:.9;letter-spacing:-.05em}
    .unit{font-size:11px;color:var(--dim);letter-spacing:.18em;font-weight:800;margin-top:6px;text-transform:uppercase}
    .row{display:flex;gap:18px;justify-content:space-between;font-size:13px;line-height:1.85;color:var(--dim);font-variant-numeric:tabular-nums}
    .row b{color:var(--ink)}
    .row.lt{border-top:1px solid rgba(255,255,255,.1);margin-top:5px;padding-top:5px}
    #help{left:50%;bottom:16px;transform:translateX(-50%);padding:7px 16px;border-radius:999px;background:rgba(7,9,14,.46);border:1px solid rgba(255,255,255,.1);font-size:12px;color:rgba(233,237,244,.72);letter-spacing:.04em;backdrop-filter:blur(8px);white-space:nowrap}
    #help b{color:var(--accent)}
    #ribbon{position:absolute;z-index:3;left:50%;top:17px;transform:translateX(-50%);padding:7px 18px;border-radius:999px;border:1px solid rgba(240,200,96,.32);background:rgba(16,14,8,.58);color:var(--warn);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;pointer-events:none}
    #flash{position:absolute;z-index:7;left:50%;top:172px;transform:translateX(-50%) translateY(-8px);padding:8px 18px;border-radius:999px;background:rgba(7,9,14,.8);border:1px solid var(--accent);color:var(--ink);font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;backdrop-filter:blur(8px)}
    #flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #lights{position:absolute;z-index:6;left:50%;top:62px;transform:translateX(-50%);display:flex;gap:13px;pointer-events:none}
    #lights i{width:32px;height:32px;border-radius:50%;background:#16191f;border:2px solid #2a2f3a;box-shadow:inset 0 2px 6px rgba(0,0,0,.7)}
    #lights i.on{background:radial-gradient(circle at 50% 36%,#ff6f60,#cf1d12);border-color:#ff6f60;box-shadow:0 0 18px 3px rgba(226,58,54,.6),inset 0 2px 6px rgba(0,0,0,.25)}
    #lights.hide{display:none}
    #gomsg{position:absolute;z-index:6;left:50%;top:46%;transform:translate(-50%,-50%) scale(.6);font-weight:900;font-style:italic;font-size:clamp(64px,13vw,128px);letter-spacing:.04em;color:var(--accent);text-shadow:0 6px 40px rgba(57,210,192,.5);opacity:0;pointer-events:none}
    #gomsg.show{animation:goFx 1s ease forwards}
    @keyframes goFx{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.22)}}
    #results,#pause{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%,rgba(6,9,14,.8),rgba(6,9,14,.95));backdrop-filter:blur(7px)}
    #pause{z-index:11}
    #results[hidden],#pause[hidden]{display:none}
    .rcard{width:min(450px,90vw);background:linear-gradient(180deg,rgba(20,26,36,.96),rgba(12,16,22,.96));border:1px solid rgba(255,255,255,.12);border-top:3px solid var(--accent);border-radius:14px;padding:30px;text-align:center;box-shadow:0 30px 80px -30px #000}
    .reye{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);font-weight:800}
    .rpos{font-size:74px;font-weight:900;font-style:italic;line-height:1;margin:4px 0 2px}
    .rsub{font-size:13px;color:var(--dim);margin-bottom:18px}
    .psub{font-size:15px;color:var(--dim);margin:8px 0 22px;font-weight:600}
    .rstats{display:flex;gap:12px;margin-bottom:16px}
    .rstats>div{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:11px}
    .rstats span{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
    .rstats b{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
    .rsplits{display:flex;flex-direction:column;gap:5px;margin-bottom:20px}
    .split{display:flex;align-items:center;gap:10px;font-size:13px;font-variant-numeric:tabular-nums;padding:6px 11px;background:rgba(255,255,255,.03);border-radius:6px}
    .split span{color:var(--dim);width:50px;text-align:left}
    .split b{font-weight:700}.split em{margin-left:auto;font-style:normal;color:var(--dim);font-size:12px}
    .split.best b,.split.best em{color:var(--accent)}
    .rbtns{display:flex;gap:10px}
    .rbtns.pcol{flex-direction:column}
    .rbtn{flex:1;font:800 13px/1 "Avenir Next",system-ui;letter-spacing:.08em;text-transform:uppercase;padding:13px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);color:var(--ink);transition:all .14s}
    .rbtn:hover{border-color:var(--accent);color:var(--accent)}
    .rbtn.primary{background:var(--accent);color:#04201d;border-color:var(--accent)}
    .rbtn.primary:hover{filter:brightness(1.08);color:#04201d}
    a{color:var(--accent)}
    @media(max-width:760px){#brand h1{font-size:14px}#help{display:none}#speed{font-size:44px}#tracks{max-width:240px}#lights i{width:24px;height:24px}}
  #drs{position:absolute;z-index:5;left:50%;bottom:52px;transform:translateX(-50%) translateY(6px);
    padding:6px 16px;border-radius:999px;background:rgba(7,9,14,.5);border:1px solid rgba(57,210,192,.35);
    color:var(--accent,#39d2c0);font:900 12px/1 'Saira',system-ui,sans-serif;letter-spacing:.24em;text-transform:uppercase;
    pointer-events:none;opacity:0;transition:opacity .15s,transform .15s,box-shadow .15s;backdrop-filter:blur(6px)}
  #drs.on{opacity:1;transform:translateX(-50%) translateY(0);background:rgba(57,210,192,.18);
    box-shadow:0 0 24px -4px rgba(57,210,192,.75)}
  #touch{position:fixed;inset:0;z-index:7;pointer-events:none;display:none;-webkit-user-select:none;user-select:none}
  body.touch #touch{display:block}
  body.touch #help{display:none}
  #tc-steer{position:absolute;left:calc(env(safe-area-inset-left,0px) + 16px);bottom:calc(env(safe-area-inset-bottom,0px) + 20px);display:flex;gap:14px}
  #tc-drive{position:absolute;right:calc(env(safe-area-inset-right,0px) + 16px);bottom:calc(env(safe-area-inset-bottom,0px) + 20px);display:flex;flex-direction:column;align-items:flex-end;gap:12px}
  .tc-pedals{display:flex;gap:14px;align-items:flex-end}
  .tc{pointer-events:auto;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;border:1.5px solid rgba(255,255,255,.22);background:rgba(10,13,18,.42);color:#eaf2f0;font:800 13px/1 'Saira',system-ui,sans-serif;letter-spacing:.08em;backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .05s,background .1s,box-shadow .1s}
  .tc.held{transform:scale(.94)}
  .tc-dir{width:80px;height:80px;border-radius:22px;font-size:28px}
  .tc-gas{width:98px;height:98px;border-radius:50%;font-size:18px;border-color:rgba(57,210,192,.5);color:#39d2c0;background:rgba(57,210,192,.12)}
  .tc-gas.held{background:rgba(57,210,192,.30);box-shadow:0 0 26px -4px rgba(57,210,192,.7)}
  .tc-brake{width:80px;height:80px;border-radius:50%;font-size:15px;border-color:rgba(231,76,60,.5);color:#ff8a7a;background:rgba(231,76,60,.12)}
  .tc-brake.held{background:rgba(231,76,60,.30);box-shadow:0 0 22px -4px rgba(231,76,60,.7)}
  .tc-boost{width:128px;height:46px;border-radius:999px;font-size:13px;letter-spacing:.18em;border-color:rgba(240,200,96,.55);color:#f0c860;background:rgba(240,200,96,.1)}
  .tc-boost.held{background:rgba(240,200,96,.28);box-shadow:0 0 22px -4px rgba(240,200,96,.7)}
  .tc-aux{width:84px;height:40px;border-radius:999px;font-size:12px;letter-spacing:.16em;align-self:flex-end}
  #dash .tyre{flex:1;max-width:118px;height:7px;margin-left:10px;background:rgba(255,255,255,.13);border-radius:4px;overflow:hidden;align-self:center}
  #dash .tyre i{display:block;height:100%;width:100%;background:#3ecf6e;border-radius:4px;transition:width .3s linear,background .3s linear}
  .diff.pit{margin-left:6px}
  .diff.pit.armed{background:rgba(232,58,54,.92);color:#fff;border-color:rgba(232,58,54,.92);box-shadow:0 0 16px -3px rgba(232,58,54,.8)}
  .tc-aux.armed{border-color:rgba(232,58,54,.8);color:#ff8a7a;background:rgba(232,58,54,.2);box-shadow:0 0 18px -4px rgba(232,58,54,.72)}
  </style>
</head>
<body>
  <canvas id="apex3d"></canvas>
  <div class="hud" id="brand">
    <h1>Apex Canada 3D</h1>
    <p id="status">Lights out…</p>
  </div>
  <button id="menubtn">❚❚ Menu</button>
  <div class="hud" id="modes">
    <button data-m="race">Race</button><button data-m="quali">Quali</button><button id="diffbtn" class="diff">AI · Pro</button><button id="pitbtn" class="diff pit">PIT</button>
  </div>
  <div class="hud" id="tracks">
    <button data-t="harbour">Harbour</button><button data-t="gorge">Gorge</button><button data-t="sidney">Sidney</button><button data-t="malahat">Malahat</button><button data-t="cordova">Cordova</button><button data-t="stampede">Calgary</button><button data-t="exhibition">Toronto</button>
  </div>
  <div id="ribbon">WebGL Prototype</div>
  <div id="flash"></div>
  <div id="drs">DRS</div>
  <div id="lights" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
  <div id="gomsg">GO</div>
  <div class="hud" id="dash">
    <div id="speed">000</div>
    <div class="unit">km/h</div>
    <div class="row lt"><span>Time</span><b id="rtime">0.000</b></div>
    <div class="row"><span>Best</span><b id="rbest">--:--.---</b></div>
    <div class="row"><span>Lap</span><b><span id="lap">1</span>/<span id="laptot">3</span></b></div>
    <div class="row"><span>Tyres</span><div class="tyre"><i id="tyrefill"></i></div></div>
    <div class="row"><span>View</span><b id="view">CHASE</b></div>
  </div>
  <div class="hud" id="help">&uarr;/W throttle &middot; &darr;/S brake &middot; &larr;&rarr; steer &middot; <b>Shift boost</b> &middot; V cam &middot; T time &middot; C weather &middot; N music &middot; Esc menu</div>
  <div id="results" hidden>
    <div class="rcard">
      <div class="reye">Chequered Flag</div>
      <div class="rpos" id="res-pos">P1</div>
      <div class="rsub" id="res-sub"></div>
      <div class="rstats">
        <div><span>Total</span><b id="res-total">--</b></div>
        <div><span>Best lap</span><b id="res-best">--</b></div>
      </div>
      <div class="rsplits" id="res-splits"></div>
      <div class="rbtns">
        <button id="btn-again" class="rbtn primary">Race again</button>
        <button id="btn-circuits" class="rbtn">Change circuit</button>
      </div>
    </div>
  </div>
  <div id="pause" hidden>
    <div class="rcard">
      <div class="reye">Paused</div>
      <div class="psub" id="pause-sub">Apex Canada</div>
      <div class="rbtns pcol">
        <button id="pz-resume" class="rbtn primary">Resume</button>
        <button id="pz-restart" class="rbtn">Restart</button>
        <button id="pz-quit" class="rbtn">Quit to menu</button>
      </div>
    </div>
  </div>
  <div id="touch" aria-hidden="true">
    <div id="tc-steer">
      <button class="tc tc-dir" id="tc-left">&#9664;</button>
      <button class="tc tc-dir" id="tc-right">&#9654;</button>
    </div>
    <div id="tc-drive">
      <button class="tc tc-aux" id="tc-cam">CAM</button>
      <button class="tc tc-aux" id="tc-pit">PIT</button>
      <button class="tc tc-boost" id="tc-boost">BOOST</button>
      <div class="tc-pedals">
        <button class="tc tc-brake" id="tc-brake">BRAKE</button>
        <button class="tc tc-gas" id="tc-gas">GAS</button>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>

const canvas = document.getElementById('apex3d');
const speedEl = document.getElementById('speed');
const lapEl = document.getElementById('lap');
const viewEl = document.getElementById('view');
const statusEl = document.getElementById('status');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07111f);
scene.fog = new THREE.FogExp2(0x07111f, 0.0085);
const camera = new THREE.PerspectiveCamera(64, 1, 0.1, 2200);
const hemi = new THREE.HemisphereLight(0xbcd0ea, 0x20262e, 1.05); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff1d0, 2.3);
sun.position.set(-140, 260, 130);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 620;
sun.shadow.camera.left = -240;
sun.shadow.camera.right = 240;
sun.shadow.camera.top = 240;
sun.shadow.camera.bottom = -240;
scene.add(sun);

/* ---------- Vancouver Island circuits (ctrl points ported from the v56 career build) ---------- */
const CIRCUITS = {
  harbour:{name:'Harbour Circuit', ctrl:[[700,1500],[1500,1480],[2200,1430],[2520,1180],[2580,800],[2520,520],[1900,380],[1300,420],[950,640],[880,1000],[620,1280],[520,1600],[560,1980],[760,2120],[700,2360],[900,2520],[1280,2470],[1560,2560],[1760,2430],[2040,2520],[2380,2500],[2620,2300],[2700,2020],[2540,1880],[2180,1900],[1880,1820],[1560,1900],[1240,1830],[980,1920],[760,1760]]},
  gorge:{name:'The Gorge', ctrl:[[820,1480],[1340,1420],[1620,1520],[1780,1340],[1660,1120],[1380,1080],[1500,860],[1880,800],[2020,1000],[2120,1320],[2060,1560],[2300,1720],[2480,1980],[2300,2420],[1960,2440],[1740,2180],[1860,1880],[1700,1760],[1500,1820],[1320,2040],[1380,2320],[1180,2480],[900,2440],[760,2220],[880,1960],[700,1820],[560,1600],[640,1360],[820,1480]]},
  sidney:{name:'Peninsula Run', ctrl:[[640,2080],[1120,2200],[1640,2240],[2120,2200],[2460,2020],[2560,1680],[2420,1380],[2480,1060],[2600,760],[2460,470],[2080,400],[1680,460],[1560,760],[1700,1040],[1520,1260],[1160,1240],[940,1020],[1000,700],[860,460],[540,500],[420,820],[520,1160],[760,1380],[760,1700],[640,2080]]},
  malahat:{name:'The Malahat Climb', ctrl:[[620,2320],[1140,2390],[1680,2360],[2100,2380],[2420,2240],[2560,1960],[2460,1720],[2580,1500],[2500,1280],[2620,1060],[2480,760],[2560,520],[2300,400],[1900,420],[1500,440],[1120,400],[760,460],[520,640],[440,940],[600,1220],[460,1480],[600,1740],[480,2020]], climb:340, roll:32},
  cordova:{name:'Cordova Bay', ctrl:[[2150,2800],[2200,2300],[2225,1790],[2220,1280],[2175,780],[2070,440],[1800,300],[1380,270],[980,330],[640,500],[400,850],[330,1290],[450,1670],[330,2060],[400,2470],[620,2770],[1000,2870],[1460,2830],[1880,2800],[2030,2710]]},
  stampede:{name:'Stampede Sprint', ctrl:[[1700,2120],[2200,2030],[2640,1860],[3200,1800],[3760,1580],[4120,1180],[4000,720],[3500,420],[2960,330],[2460,340],[1980,320],[1480,360],[1000,470],[520,620],[-40,760],[-560,920],[-1080,1120],[-1560,1420],[-1820,1820],[-1560,2180],[-1000,2280],[-440,2180],[120,2100],[640,2040],[1080,1920],[1420,2040],[1600,2110]]},
  exhibition:{name:'Exhibition Street Circuit', backdrop:'skyline', ctrl:[[620,1750],[900,2080],[1450,2260],[2150,2290],[2850,2230],[3550,2090],[4150,1850],[4600,1480],[4750,950],[4520,460],[4000,180],[3350,130],[2650,210],[1950,360],[1400,540],[950,760],[680,1150],[600,1480]]},
};
const _HASH=location.hash.slice(1).split('/');
const TRACK_ID=(_HASH[0].match(/^(harbour|gorge|sidney|malahat|cordova|stampede|exhibition)$/)||[])[0]||'stampede';
const MODE=(_HASH[1]==='quali')?'quali':'race';
const circuit = CIRCUITS[TRACK_ID] || CIRCUITS.harbour;
const raw = circuit.ctrl.slice();
if(raw.length>2){const a=raw[0],b=raw[raw.length-1]; if(Math.hypot(a[0]-b[0],a[1]-b[1])<1) raw.pop();}  // drop duplicate closing point
const SCALE = circuit.scale || 0.17;
const LAPDIV = circuit.lapDiv || 1850;
const FOGK = 0.17/SCALE;   // thin the fog on larger circuits so you can see across them
{ const SH=Math.round(240*Math.max(1,SCALE/0.17)); sun.shadow.camera.left=-SH; sun.shadow.camera.right=SH; sun.shadow.camera.top=SH; sun.shadow.camera.bottom=-SH; sun.shadow.camera.far=Math.max(620,SH*2.6); sun.shadow.camera.updateProjectionMatrix(); }
let _mnx=1e9,_mxx=-1e9,_mny=1e9,_mxy=-1e9;
for(const [x,y] of raw){_mnx=Math.min(_mnx,x);_mxx=Math.max(_mxx,x);_mny=Math.min(_mny,y);_mxy=Math.max(_mxy,y);}
const OFFSET = new THREE.Vector3(-((_mnx+_mxx)/2)*SCALE, 0, -((_mny+_mxy)/2)*SCALE);  // auto-centre this circuit at origin
const curve = new THREE.CatmullRomCurve3(raw.map(([x,y]) => new THREE.Vector3(x*SCALE+OFFSET.x,0,y*SCALE+OFFSET.z)), true, 'catmullrom', 0.45);

/* ---------- elevation: only The Malahat climbs; harbour/gorge/sidney/cordova stay mathematically flat (v56 invariant) ---------- */
const ELEV_SCALE = SCALE * 0.62;                                                                 // hill height vs v56 units (tunable)
const CLIMB=(circuit.climb||0)*ELEV_SCALE, ROLL=(circuit.roll||0)*ELEV_SCALE;
const LAPLEN = curve.getLength();
function elevAt(t){ return CLIMB*(0.5-0.5*Math.cos(2*Math.PI*t)) + ROLL*Math.sin(6*Math.PI*t); }  // ported: 340*(0.5-0.5cos2u)+32*sin6u
function roadY(t){ return .35*Math.sin(t*Math.PI*12) + elevAt(t); }
function gradeAt(t){ const d=0.004; return elevAt((t+d)%1) - elevAt((t-d+1)%1); }                 // rise over ~0.008 lap (for car pitch)
const GROUND_Y=-0.42;
function skirtW(t){ return Math.min(Math.max(roadY(t)*1.25+9, 9), 240); }                          // wider apron where the road is higher
function slopeY(t,off){ const e=roadY(t), w=skirtW(t), k=Math.min(Math.max((off-ROAD_W/2)/w,0),1); return e+(GROUND_Y-e)*k; }

const GLASS_N=GLASSPAL.length, HERIT_N=HERITPAL.length;
function _crPt(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return [0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
          0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)];
}
function _hsh(n){ n=n|0; n=(n^61)^(n>>>16); n=n+(n<<3); n=n^(n>>>4); n=Math.imul(n,0x27d4eb2d); n=n^(n>>>15); return (n>>>0)/4294967296; }
/* walk a circuit centreline and line both sides with rows of buildings (heritage near, glass towers behind) */
function _okPlace(bx,by,cfg){ if(!cfg.clear)return true; for(const c of cfg.clear){const dx=bx-c[0],dy=by-c[1]; if(dx*dx+dy*dy<c[2]*c[2])return false;} return true; }
function genCityWall(ctrl,cfg){
  const N=ctrl.length, Pt=i=>ctrl[((i%N)+N)%N];
  const samp=[];
  for(let i=0;i<N;i++)for(let t=0;t<1;t+=0.08)samp.push(_crPt(Pt(i-1),Pt(i),Pt(i+1),Pt(i+2),t));
  const out=[]; let acc=cfg.gap, last=samp[0], idx=0;
  for(let k=1;k<samp.length;k++){
    const sp=samp[k], dx=sp[0]-last[0], dy=sp[1]-last[1], d=Math.hypot(dx,dy)||0.001; acc+=d;
    if(acc>=cfg.gap){ acc=0; const nx=-dy/d, ny=dx/d;
      /* downtown density falls off heading west out to Sarcee Trail \u2014 open road, clear mountain views */
      let dens;
      if(cfg.core){ const r=Math.hypot(sp[0]-cfg.core[0], sp[1]-cfg.core[1]);
        dens=Math.max(0,Math.min(1,(cfg.core[3]-r)/(cfg.core[3]-cfg.core[2]))); }
      else dens=Math.max(0,Math.min(1,(sp[0]-cfg.openX)/(cfg.coreX-cfg.openX)));
      for(const side of [-1,1]){ idx++;
        if(dens<=0.02){                                                  /* open Sarcee zone: scattered foothills, no city */
          if(cfg.forest!==false && _hsh(idx*71)>0.5){ const of=cfg.setback+40+_hsh(idx*79)*200;
            out.push({x:sp[0]+nx*side*of, y:sp[1]+ny*side*of, t:"fir", label:"", ph:_hsh(idx*83)*6}); }
          continue;
        }
        if(_hsh(idx*2+1)<0.94*dens){                                     /* near low-rise/heritage street wall */
          const o0=cfg.setback + _hsh(idx*3+1)*28;
          out.push({x:sp[0]+nx*side*o0, y:sp[1]+ny*side*o0, t:"lowrise",
                    w:90+_hsh(idx*3)*70, h:0.55+_hsh(idx*5)*0.85, c:(_hsh(idx*7)*HERIT_N)|0, label:""});
        }
        if(_hsh(idx*11)<0.82*dens){                                      /* glass tower row */
          const o1=cfg.setback+cfg.depth+_hsh(idx*13)*110;
          out.push({x:sp[0]+nx*side*o1, y:sp[1]+ny*side*o1, t:"gtower",
                    w:78+_hsh(idx*17)*92, h:0.5+_hsh(idx*19)*1.5, c:(_hsh(idx*23)*GLASS_N)|0,
                    crown:(_hsh(idx*29)*3)|0, label:""});
        }
        if(_hsh(idx*31)<0.28*dens){                                      /* occasional tall feature tower, set back */
          const o2=cfg.setback+cfg.depth*2+_hsh(idx*37)*190;
          out.push({x:sp[0]+nx*side*o2, y:sp[1]+ny*side*o2, t:"gtower",
                    w:92+_hsh(idx*41)*80, h:1.25+_hsh(idx*43)*1.05, c:(_hsh(idx*47)*GLASS_N)|0,
                    crown:(_hsh(idx*53)*3)|0, label:""});
        }
        if(side===1 && _hsh(idx*59)<0.17*dens){                          /* a +15 skybridge over the canyon */
          const ob=cfg.setback+cfg.depth*0.5;
          out.push({x:sp[0]+nx*ob, y:sp[1]+ny*ob, t:"skybridge",
                    w:150+_hsh(idx*61)*120, lift:90+_hsh(idx*67)*70, label:""});
        }
      }
    }
    last=sp;
  }
  return out.filter(b=> b.t==="fir" || _okPlace(b.x,b.y,cfg));
}

function fmt(t){ if(!isFinite(t)||t<0)return '--:--.---'; const m=Math.floor(t/60), s=t-m*60; return m>0?(m+':'+s.toFixed(3).padStart(6,'0')):s.toFixed(3); }

function goFlash(){ if(lightsBox)lightsBox.classList.add('hide'); if(gomsg){gomsg.classList.add('show'); setTimeout(()=>gomsg.classList.remove('show'),1000);} }
function updateRace(dt){
  if(race.state==='countdown'){ race.cd+=dt; setLights(Math.min(5,Math.floor(race.cd/0.6)));
    if(race.cd>=race.goAt){ race.state='racing'; race.clock=0; race.lapStart=0; setLights(0); goFlash(); } }
  else if(race.state==='racing'){ race.clock+=dt; }
}
function onLapComplete(car){
  if(car!==player)return;
  if(MODE==='quali'){
    if(race.phase==='out'){ race.phase='hot'; race.clock=0; race.lapStart=0; if(typeof flash==='function')flash('HOT LAP \u2014 GO'); }
    else if(race.phase==='hot'){ race.hot=race.clock; finishRace(); }
    return;
  }
  if(player.lap<=LAPS+1){ const split=race.clock-race.lapStart; race.lapStart=race.clock; race.laps.push(split); if(split<race.best)race.best=split; }
  if(player.lap>LAPS) finishRace();
}
function finishRace(){
  if(race.state==='finished')return; race.state='finished';
  const box=document.getElementById('results'); if(!box)return;

    const eye=document.querySelector('.reye'), stats=document.querySelectorAll('.rstats > div'), again=document.getElementById('btn-again');

    if(eye)eye.textContent='Flying Lap';
    document.getElementById('res-pos').textContent=fmt(hot);
    let grade=''; if(delta!=null) grade = delta<=-0.4?'POLE PACE' : delta<=0.4?'FRONT-ROW PACE' : delta<=1.2?'MIDFIELD' : 'WORK TO DO';
    document.getElementById('res-sub').textContent='Qualifying \u00b7 '+circuit.name+(grade?' \u00b7 '+grade:'');
    if(stats[0]){ stats[0].querySelector('span').textContent='Reference'; document.getElementById('res-total').textContent=(base!=null)?fmt(base):'--'; }
    if(stats[1]){ stats[1].querySelector('span').textContent='Delta'; const de=document.getElementById('res-best'); de.textContent=(delta!=null)?((delta>=0?'+':'')+delta.toFixed(2)+'s'):'--'; de.style.color=(delta!=null)?(delta<=0?'var(--accent)':'var(--warn)'):''; }
    document.getElementById('res-splits').innerHTML='';

  document.getElementById('res-pos').textContent='P'+race.pos;
  document.getElementById('res-sub').textContent=circuit.name+' \u00b7 '+LAPS+' laps \u00b7 started P'+(player.gridPos+1);
  document.getElementById('res-total').textContent=fmt(race.laps.reduce((a,b)=>a+b,0));
  document.getElementById('res-best').textContent=fmt(race.best);
  const base=BASELAP[TRACK_ID], dl=document.getElementById('res-splits'); dl.innerHTML='';
  race.laps.forEach((s,i)=>{ const d=document.createElement('div'); d.className='split'+(s===race.best?' best':'');

}

let actx=null, eng=null, sub=null, engGain=null, audioOn=true, nbuf=null;
const music={on:true,next:0,step:0,gain:null,duck:null}; let trackIdx=0;
function initAudio(){
  if(actx) return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    engGain=actx.createGain(); engGain.gain.value=0; engGain.connect(actx.destination);
    nbuf=actx.createBuffer(1,actx.sampleRate,actx.sampleRate); { const _c=nbuf.getChannelData(0); for(let _i=0;_i<_c.length;_i++)_c[_i]=Math.random()*2-1; }
    music.gain=actx.createGain(); music.gain.gain.value=0.11; music.gain.connect(actx.destination);
    music.duck=actx.createGain(); music.duck.gain.value=1; music.duck.connect(music.gain);
    const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1100; lp.connect(engGain);
    eng=actx.createOscillator(); eng.type='sawtooth'; eng.frequency.value=55; eng.connect(lp);
    sub=actx.createOscillator(); sub.type='square'; sub.frequency.value=27;
    const sg=actx.createGain(); sg.gain.value=.5; sub.connect(sg); sg.connect(lp);
    eng.start(); sub.start();
  }catch(err){ actx=null; }
}
function audioUpdate(){
  if(!actx||!eng) return;
  const rev=Math.min(player.speed/player.maxSpeed,1.15), now=actx.currentTime;
  const f=52 + rev*255 + (keys.has('shift')?28:0);
  eng.frequency.setTargetAtTime(f, now, .04);
  sub.frequency.setTargetAtTime(f*.5, now, .07);
  const g=audioOn ? (race.state==='finished' ? 0 : .035 + rev*.11) : 0;
  engGain.gain.setTargetAtTime(g, now, .09);
}

function musicTick(){

  if(!playing){music.next=0;return;}
  const spb=60/M_TRACK().bpm/2;
  if(!music.next){music.next=actx.currentTime+0.06;music.step=0;}
  while(music.next<actx.currentTime+0.3){
    const t=music.next,s=music.step,bar=(s>>3)%4; const TR=M_TRACK(); const ch=TR.arp[bar];
    if(TR.trance){ const beat=spb*2;
      if(s%2===0){ mKick(t); mPump(t,beat); }
      if(s%2===1) mNoise(t,0.11,"highpass",7000,0.13);
      mNoise(t,0.018,"highpass",9500,0.05);
      if(s%4===2) mNoise(t,0.12,"bandpass",2000,0.20,music.duck);
      if(s%2===1) mTone(t,m2f(TR.bass[s%16]),spb*0.8,"sawtooth",0.24,null,music.duck);
      mSaw(t,         m2f(ch[s%ch.length]+12),     spb*0.6,0.055,music.duck,3);
      mSaw(t+spb*0.5, m2f(ch[(s+2)%ch.length]+12), spb*0.6,0.055,music.duck,3);
      if(s%8===0){ for(const n of ch) mSaw(t,m2f(n),beat*4*0.97,0.03,music.duck,5); }
    } else {
      if(s%4===0)mTone(t,130,0.12,"sine",0.55,35);
      if(s%8===4)mNoise(t,0.09,"bandpass",1900,0.28);
      if(s%2===1)mNoise(t,0.03,"highpass",7200,0.15);

function createCar(primary,secondary,isPlayer){
  const g=new THREE.Group();
  const carbon=new THREE.MeshStandardMaterial({color:0x171a20,metalness:.35,roughness:.5});
  const carbonD=new THREE.MeshStandardMaterial({color:0x0b0d11,metalness:.3,roughness:.55});
  const paint=new THREE.MeshStandardMaterial({color:primary,metalness:.25,roughness:.32});
  const acc=new THREE.MeshStandardMaterial({color:secondary,metalness:.3,roughness:.42});
  const rubber=new THREE.MeshStandardMaterial({color:0x14161a,roughness:.9,map:TYRETEX});
  const hubMat=new THREE.MeshStandardMaterial({color:0x2c313a,metalness:.7,roughness:.35});
  const noseMat=new THREE.MeshStandardMaterial({color:isPlayer?0xeceef1:primary,metalness:.2,roughness:.35});
  const add=(mesh,x,y,z)=>{mesh.position.set(x,y,z); mesh.castShadow=true; mesh.receiveShadow=true; g.add(mesh); return mesh;};
  const B=(w,h,d,m)=>new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
  // floor / chassis plank
  add(B(1.7,.26,8.2,carbon),0,.42,.1);
  // central tub + engine cover
  add(B(1.25,.55,2.6,carbon),0,.78,.2);
  add(B(.66,.2,1.1,carbonD),0,1.0,.55);                        // cockpit recess
  add(B(.95,.72,2.8,carbon),0,.92,-1.5);                       // engine cover
  add(B(.5,.42,1.1,carbon),0,.78,-3.0);                        // tail taper
  add(B(.5,.5,.7,carbon),0,1.42,-.2);                          // airbox
  add(B(.5,.06,1.6,paint),0,1.32,-.4);                         // livery spine stripe
  // nose
  add(B(.92,.34,2.8,noseMat),0,.5,3.5);
  add(B(.5,.24,.9,noseMat),0,.46,4.85);
  // sidepods
  for(const sx of [-1,1]){
    add(B(.78,.62,3.0,carbon),sx*1.12,.62,-.3);
    add(B(.06,.32,1.7,acc),sx*1.52,.66,-.3);                   // accent panel
  }
  // halo + front spar
  const halo=add(new THREE.Mesh(new THREE.TorusGeometry(.84,.075,10,34,Math.PI*1.25),carbonD),0,1.18,.5);
  halo.rotation.x=Math.PI/2; halo.rotation.z=Math.PI*.875;
  add(B(.09,.09,.8,carbonD),0,1.2,1.15);                       // front spar
  // driver — helmet group that looks into the corners
  const driver=new THREE.Group(); driver.position.set(0,1.06,.5);
  const helmMat=isPlayer?new THREE.MeshStandardMaterial({color:0xe23a36,roughness:.34,metalness:.05,emissive:0xe23a36,emissiveIntensity:.16}):new THREE.MeshStandardMaterial({color:secondary,roughness:.42});

  const visor=new THREE.Mesh(new THREE.BoxGeometry(.36,.15,.10),new THREE.MeshStandardMaterial({color:0x0a0e15,metalness:.6,roughness:.15,emissive:0x0a1822,emissiveIntensity:.25})); visor.position.set(0,.02,.30); driver.add(visor);
  if(isPlayer){ const stripe=new THREE.Mesh(new THREE.BoxGeometry(.08,.12,.46),new THREE.MeshStandardMaterial({color:0xeef2f6,roughness:.4})); stripe.position.set(0,.27,-.02); driver.add(stripe); }
  const shoulders=new THREE.Mesh(new THREE.BoxGeometry(.6,.28,.5),carbonD); shoulders.position.set(0,-.34,-.06); shoulders.castShadow=true; driver.add(shoulders);
  g.add(driver);
  // front wing
  add(B(3.3,.08,1.0,carbon),0,.3,4.9);
  add(B(3.0,.05,.3,acc),0,.36,5.18);
  for(const sx of [-1,1])add(B(.08,.5,1.0,carbonD),sx*1.65,.45,4.9);
  // rear wing — fixed lower element + hinged DRS flap
  add(B(2.7,.14,.62,carbon),0,1.58,-4.16);                     // main plane (lower element)
  const drs=new THREE.Group(); drs.position.set(0,1.76,-4.30);  // hinge along the upper leading edge
  const flap=new THREE.Mesh(new THREE.BoxGeometry(2.7,.07,.5),acc); flap.position.set(0,0,-.22); flap.castShadow=true; drs.add(flap);
  drs.rotation.x=-0.5;                                          // closed = steep (downforce)
  g.add(drs);
  for(const sx of [-1,1]){add(B(.1,.7,.15,carbonD),sx*.5,1.25,-4.1); add(B(.08,.86,.95,carbonD),sx*1.35,1.5,-4.2);}
  add(B(2.0,.08,.3,carbon),0,.95,-4.3);                        // beam wing
  // wheels (open) + hubs + wishbones — y derived from radius so bigger tyres sit right
  const wheel=(x,z,r,wd)=>{
    const yc=r-0.27;
    const wg=new THREE.CylinderGeometry(r,r,wd,22); wg.rotateZ(Math.PI/2);
    add(new THREE.Mesh(wg,rubber),x,yc,z);
    const hg=new THREE.CylinderGeometry(r*.42,r*.42,wd+.02,14); hg.rotateZ(Math.PI/2);
    add(new THREE.Mesh(hg,hubMat),x,yc,z);
    add(B(Math.abs(x)-.9,.08,.12,carbonD), x>0? x/2+.2 : x/2-.2, yc, z); // wishbone (static)

  wheel(-2.48,-2.5,.98,1.16); wheel(2.48,-2.5,.98,1.16);          // rear — fat modern slicks
  // player livery: Ethical AI wordmark + real POLYMATH crest
  if(isPlayer){
    const decal=(tex,w,h,x,y,z,ry,rx,back)=>{
      const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
        new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide}));
      m.position.set(x,y,z); if(ry)m.rotation.y=ry; if(rx)m.rotation.x=rx; if(back)m.scale.x=-1; g.add(m);
    };

    decal(TCREST_DARK,1.2,.95,-.50,.55,3.4,-Math.PI/2);        // nose flank L
    decal(TCREST_LIGHT,.8,.63, 0,1.34,-1.9, 0,-Math.PI/2);     // engine-cover top (chase-visible)
    decal(TCREST_LIGHT,.62,.49, 1.40,1.5,-4.2, Math.PI/2);     // rear endplate R
    decal(TCREST_LIGHT,.62,.49,-1.40,1.5,-4.2,-Math.PI/2);     // rear endplate L
    decal(TWORD,2.5,.52, 1.55,.66,-.3, Math.PI/2);             // sidepod R
    decal(TWORD,2.5,.52,-1.55,.66,-.3,-Math.PI/2);             // sidepod L
    decal(TWORD,2.7,.50, 0,.35,4.9, 0,-Math.PI/2);             // front wing top
    decal(TWORD,2.4,.28, 0,1.62,-4.66, Math.PI);               // rear wing (reads correctly from behind)
    const glow=new THREE.PointLight(primary,.6,16); glow.position.set(0,1.4,-2.6); g.add(glow);
  }
  // F1 rear rain light + exhaust backfire
  const rainMat=new THREE.MeshStandardMaterial({color:0x5a0c0c,emissive:0xff1818,emissiveIntensity:1.1});
  add(B(.32,.34,.12,rainMat),0,.95,-4.55);
  const flame=new THREE.Mesh(new THREE.ConeGeometry(.2,1.2,8),new THREE.MeshBasicMaterial({color:0xff7a1a}));
  flame.rotation.x=-Math.PI/2; flame.position.set(0,.72,-4.75); flame.visible=false; g.add(flame);
  return {mesh:g,isPlayer,rainMat,flame,helmet:driver,drs,drsT:0,drsActive:false};
}

function updateCar(car,dt){
  const _pitting = race.state==='racing' && car.pitT>0;
  if(_pitting){ car.pitT-=dt; if(car.pitT<=0){ car.tyre=1; car.pitStops=(car.pitStops||0)+1; car.pitCool=6; if(car.isPlayer){flash('TYRES FITTED'); if(typeof setPitBtn==='function')setPitBtn();} } }
  if(car.isPlayer){
    const racing=race.state==='racing';
    const throttle=racing&&!_pitting&&(keys.has('arrowup')||keys.has('w')), brake=racing&&!_pitting&&(keys.has('arrowdown')||keys.has('s')), left=racing&&!_pitting&&(keys.has('arrowleft')||keys.has('a')), right=racing&&!_pitting&&(keys.has('arrowright')||keys.has('d')), boost=racing&&!_pitting&&keys.has('shift');
    if(throttle)car.speed+=(boost?46:32)*dt; else car.speed-=11*dt; if(brake)car.speed-=44*dt; if(_pitting)car.speed-=36*dt;
    const HALF=ROAD_W/2, WALL=HALF+4.5, onGrass=Math.abs(car.lateral)>HALF;
    if(onGrass)car.speed-=26*dt;                                   // grass scrubs your speed
    car.speed=THREE.MathUtils.clamp(car.speed,0,boost?car.maxSpeed*1.13:car.maxSpeed);
    car.steer=THREE.MathUtils.lerp(car.steer,(left?-1:0)+(right?1:0),1-Math.pow(.0016,dt));
    const grip=(onGrass?.4:1)*(0.62+0.38*car.tyre);               // grip falls away as tyres wear
    const t0=curve.getTangentAt(car.progress).normalize(), t1=curve.getTangentAt((car.progress+.006)%1).normalize();
    const drift=-(t0.x*t1.z-t0.z*t1.x);                            // centrifugal — fast corners run you wide
    car.lateral+=car.steer*dt*(13+car.speed*.085)*grip + drift*car.speed*.7*dt;
    car.lateral*=Math.pow(.82,dt);                                 // gentle self-centre; hold your own line
    if(Math.abs(car.lateral)>WALL){car.lateral=Math.sign(car.lateral)*WALL; car.speed*=.35; car.steer*=-.25;}  // barrier hit
    if(_pitting){ car.lateral=THREE.MathUtils.lerp(car.lateral,WALL*0.72,1-Math.pow(.05,dt)); }
    else { const working=Math.abs(car.steer)*0.9+(throttle?0.45:0)+(boost?0.4:0)+(brake?0.3:0); const _pd=(car.speed*dt)/LAPDIV; car.tyre=Math.max(0.18,car.tyre-WEAR_RATE*_pd*(0.6+working)); }
    car.rainMat.emissiveIntensity = brake?2.8:1.1;                 // brake brightens the rain light
    car.flameOn=(car.flameOn||0)-dt;                               // exhaust backfire now and then
    if(car.flameOn>0){ car.flame.visible=true; }
    else { car.flame.visible=false; const lifting=racing&&!throttle&&car.speed>22; if(racing&&Math.random()<(lifting?0.06:0.008)) car.flameOn=0.05+Math.random()*0.07; }
  }else if(race.state==='racing'){
    if(_pitting){ car.speed-=36*dt; if(car.speed<0)car.speed=0; const HW=ROAD_W/2+4.5; car.lateral=THREE.MathUtils.lerp(car.lateral,HW*0.72,1-Math.pow(.05,dt)); }
    else { const tg=0.7+0.3*car.tyre; const target=car.maxSpeed*car.pace*DIFFS[diffIdx].mul*tg*(.86+.08*Math.sin(performance.now()*.0004+car.progress*12)); car.speed=THREE.MathUtils.lerp(car.speed,target,.8*dt); car.lateral=Math.sin(performance.now()*.0006+car.progress*32)*2.2; car.tyre=Math.max(0.2,car.tyre-WEAR_RATE*((car.speed*dt)/LAPDIV)*1.05); }
  }
  if(race.state==='racing'){ car.last=car.progress; car.progress=(car.progress+(car.speed*dt)/LAPDIV)%1; if(car.progress<car.last){ car.lap++; onLapComplete(car); if(car.lap<=LAPS){ const wp=car.isPlayer?car.wantPit:(car.tyre<0.4&&LAPS>=4&&(car.pitStops||0)<1&&car.lap<LAPS); if(wp){ car.pitT=PIT_TIME; car.wantPit=false; if(car.isPlayer){flash('IN THE PITS \u2014 STOP-GO'); if(typeof setPitBtn==='function')setPitBtn();} } } } car.total=(car.lap-1)+car.progress; }
  const p=curve.getPointAt(car.progress), tan=curve.getTangentAt(car.progress).normalize(), n=new THREE.Vector3(-tan.z,0,tan.x).normalize(), pos=p.clone().addScaledVector(n,car.lateral);
  pos.y=roadY(car.progress)+.30; car.mesh.position.copy(pos); car.mesh.rotation.order='YXZ'; car.mesh.rotation.y=Math.atan2(tan.x,tan.z)-car.steer*.12; car.mesh.rotation.x=THREE.MathUtils.clamp(-Math.atan2(gradeAt(car.progress),LAPLEN*0.008),-.26,.26);
  for(const child of car.mesh.children)if(child.geometry&&child.geometry.type==='CylinderGeometry')child.rotation.x+=car.speed*dt*.06;
  { const ta=curve.getTangentAt(car.progress).normalize(), tb=curve.getTangentAt((car.progress+.012)%1).normalize(); const turn=ta.x*tb.z-ta.z*tb.x;
    const braking=car.isPlayer&&(keys.has('arrowdown')||keys.has('s'));
    const drsOpen = race.state==='racing' && car.speed>car.maxSpeed*0.7 && Math.abs(turn)<0.05 && !braking; car.drsActive=drsOpen;
    if(car.drs){ car.drsT=THREE.MathUtils.lerp(car.drsT||0, drsOpen?1:0, 1-Math.pow(0.0006,dt)); car.drs.rotation.x=THREE.MathUtils.lerp(-0.5,0.18,car.drsT); }
    if(car.helmet){ const look=car.isPlayer? -car.steer*0.45 : THREE.MathUtils.clamp(-turn*7,-0.4,0.4); car.helmet.rotation.y=THREE.MathUtils.lerp(car.helmet.rotation.y, look, 1-Math.pow(0.003,dt)); } }
}

function updateCamera(dt){
  const p=player.mesh.position, f=curve.getTangentAt(player.progress).normalize(), r=new THREE.Vector3(f.z,0,-f.x).normalize(); let desired, look;
  if(view==='COCKPIT'){desired=p.clone().addScaledVector(f,3.8).add(new THREE.Vector3(0,2.25,0)); look=p.clone().addScaledVector(f,55).add(new THREE.Vector3(0,2.1,0));}
  else if(view==='BUMPER'){desired=p.clone().addScaledVector(f,6.5).add(new THREE.Vector3(0,.95,0)); look=p.clone().addScaledVector(f,70).add(new THREE.Vector3(0,1.15,0));}
  else{desired=p.clone().addScaledVector(f,-23).addScaledVector(r,-player.steer*2).add(new THREE.Vector3(0,10.5,0)); look=p.clone().addScaledVector(f,36).add(new THREE.Vector3(0,3.2,0));}
  const s=1-Math.pow(.0007,dt); camPos.lerp(desired,s); camTarget.lerp(look,s); camera.position.copy(camPos); camera.lookAt(camTarget); camera.fov=THREE.MathUtils.lerp(camera.fov,view==='CHASE'?62+player.speed*.06:70+player.speed*.035,.05); camera.updateProjectionMatrix();
}

function cycleView(){view=view==='CHASE'?'COCKPIT':view==='COCKPIT'?'BUMPER':'CHASE'; viewEl.textContent=view;}
function resize(){renderer.setSize(innerWidth,innerHeight,false); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();}
function loop(){const dt=Math.min(clock.getDelta(),.033); if(paused){ if(engGain)engGain.gain.value=0; renderer.render(scene,camera); requestAnimationFrame(loop); return; } updateRace(dt); cars.forEach(c=>updateCar(c,dt)); updateCamera(dt); audioUpdate(); musicTick(); updateRain(dt); { const _t=performance.now()*0.001; for(let _i=0;_i<ANIM.length;_i++) ANIM[_i](_t,dt); } speedEl.textContent=Math.round(player.speed*3.1).toString().padStart(3,'0'); lapEl.textContent=(MODE==='quali')?player.lap:Math.min(player.lap,LAPS); if(timeEl)timeEl.textContent=(MODE==='quali')?(race.phase==='hot'?fmt(race.clock):(race.phase==='out'?'OUT':'0.000')):fmt(race.state==='racing'?race.clock-race.lapStart:0); if(bestEl)bestEl.textContent=isFinite(race.best)?fmt(race.best):'--:--.---'; if(drsEl)drsEl.classList.toggle('on',!!player.drsActive); if(tyreFill){const _tv=player.tyre||1; tyreFill.style.width=(_tv*100).toFixed(0)+'%'; tyreFill.style.background='hsl('+Math.round(_tv*120)+',72%,46%)';} statusEl.textContent=(MODE==='quali')?(race.state==='finished'?'LAP SET':(race.phase==='out'?'OUT LAP \u2014 BUILD SPEED':'HOT LAP')):(race.state==='countdown'?'LIGHTS OUT\u2026':(race.state==='finished'?'FINISHED':circuit.name.toUpperCase()+' \u00b7 '+TODS[todIdx].name)); renderer.render(scene,camera); requestAnimationFrame(loop);}

  </script>
